name: dbt Continuous Integration

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  dbt_run_ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system dbt-bigquery

      - name: Setup dbt Profiles Directory
        run: |
          mkdir -p ~/.dbt
          cp profiles.yml ~/.dbt/profiles.yml

      # Instead of just "dbt run", explicitly route folders to their targets
      - name: Run dbt Staging Models
        run: dbt run --select staging --target staging

      - name: Run dbt Mart Models
        run: dbt run --select marts --target mart
